<svg viewBox="0 0 1200 628" width="1200" height="628" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&amp;family=Inter:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <title>Sabha OS — A local-first AI council protocol for Claude</title>

  <!-- ═══ BASE ═══ -->
  <rect width="1200" height="628" fill="#F5F0E6"/>
  <rect x="0" y="0"   width="1200" height="3" fill="#D67E2C"/>
  <rect x="0" y="72"  width="1200" height="2" fill="#0F1419"/>
  <rect x="0" y="542" width="1200" height="1" fill="#0F1419" opacity="0.14"/>
  <line x1="640" y1="80" x2="640" y2="542"
    stroke="#0F1419" stroke-width="1" opacity="0.09"/>

  <!-- ═══ HEADER ═══ -->
  <text x="52" y="54"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="46" font-weight="700" letter-spacing="-0.5"
    fill="#0F1419">SABHA OS</text>
  <text x="1148" y="36"
    font-family="'JetBrains Mono', monospace"
    font-size="9" letter-spacing="1.8" text-anchor="end"
    fill="#0F1419" opacity="0.35">OPEN-SOURCE &#160;·&#160; LOCAL-FIRST FOR CLAUDE &#160;·&#160; MIT</text>
  <text x="1148" y="57"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="16" font-style="italic" text-anchor="end"
    fill="#0F1419" opacity="0.55">github.com/rdmurugan/sabhaos</text>

  <!-- ══════════════════════════════════════════════════════
       LEFT COLUMN  x 52–640
       Top: what Sabha IS  |  Bottom: what it looks like
  ══════════════════════════════════════════════════════════ -->

  <!-- ── WHAT IS SABHA — the concept in 3 lines ── -->
  <text x="52" y="122"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="38" font-weight="600" fill="#0F1419">Ask Claude anything.</text>

  <text x="52" y="165"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="38" font-weight="600" fill="#0F1419">Sabha routes it to the</text>

  <text x="52" y="208"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="38" font-weight="600" fill="#D67E2C">right specialist.</text>

  <!-- One-line clarifier -->
  <text x="52" y="232"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="14" font-style="italic" fill="#0F1419" opacity="0.42">Recommends. Names the tradeoff. Every single time.</text>

  <!-- Thin rule separating concept from example -->
  <line x1="52" y1="248" x2="612" y2="248"
    stroke="#0F1419" stroke-width="1" opacity="0.1"/>

  <!-- ── WHAT IT LOOKS LIKE — sample reply (smaller) ── -->
  <!-- Saffron left bar -->
  <rect x="52" y="260" width="3" height="152" fill="#D67E2C" opacity="0.7"/>

  <text x="70" y="278"
    font-family="'JetBrains Mono', monospace"
    font-size="10.5" letter-spacing="0.5"
    fill="#D67E2C">Routing: Finance.</text>

  <text x="70" y="310"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="26" font-weight="600" fill="#0F1419">Cut the SaaS line 40%.</text>

  <text x="70" y="338"
    font-family="'JetBrains Mono', monospace"
    font-size="12.5" fill="#0F1419" opacity="0.4">You lose the analytics tier.</text>

  <text x="70" y="358"
    font-family="'JetBrains Mono', monospace"
    font-size="12.5" fill="#B8924D">Worth it — that tier isn't driving renewals.</text>

  <!-- Anatomy callout labels -->
  <line x1="70" y1="374" x2="610" y2="374"
    stroke="#0F1419" stroke-width="1" opacity="0.07"/>
  <text x="70"  y="388" font-family="'Inter', sans-serif" font-size="8.5" letter-spacing="1.8" fill="#3F6E6A">SPECIALIST ROUTED</text>
  <text x="248" y="388" font-family="'Inter', sans-serif" font-size="8.5" letter-spacing="1.8" fill="#3F6E6A">RECOMMENDATION</text>
  <text x="418" y="388" font-family="'Inter', sans-serif" font-size="8.5" letter-spacing="1.8" fill="#3F6E6A">TRADEOFF</text>

  <!-- How it works — 3-step plain text -->
  <line x1="52" y1="408" x2="612" y2="408"
    stroke="#0F1419" stroke-width="1" opacity="0.07"/>
  <text x="52" y="424" font-family="'Inter', sans-serif" font-size="11" fill="#0F1419" opacity="0.42">01 &#160; Your question is routed to the right specialist automatically</text>
  <text x="52" y="442" font-family="'Inter', sans-serif" font-size="11" fill="#0F1419" opacity="0.42">02 &#160; The specialist recommends — doesn't survey options</text>
  <text x="52" y="460" font-family="'Inter', sans-serif" font-size="11" fill="#0F1419" opacity="0.42">03 &#160; Every session writes back to your local memory (Sakthi)</text>

  <!-- Local-first note -->
  <text x="52" y="490"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="13" font-style="italic" fill="#0F1419" opacity="0.28">Your accumulated knowledge lives on your machine — never the cloud.</text>

  <!-- Install command hint -->
  <text x="52" y="524"
    font-family="'JetBrains Mono', monospace"
    font-size="9.5" fill="#0F1419" opacity="0.25">claude plugin marketplace add rdmurugan/sabhaos</text>

  <!-- ══════════════════════════════════════════════════════
       RIGHT COLUMN  x 668–1148
  ══════════════════════════════════════════════════════════ -->

  <!-- 9 Specializations -->
  <text x="668" y="104"
    font-family="'JetBrains Mono', monospace"
    font-size="8.5" letter-spacing="2.2" fill="#3F6E6A">9 SPECIALIZATIONS — ROUTED AUTOMATICALLY</text>

  <text x="668" y="128" font-family="'Inter', sans-serif" font-size="13" fill="#0F1419" opacity="0.7">Finance &#160;·&#160; Marketing &#160;·&#160; Infrastructure</text>
  <text x="668" y="149" font-family="'Inter', sans-serif" font-size="13" fill="#0F1419" opacity="0.7">AI Strategy &#160;·&#160; Strategy &#160;·&#160; Experience</text>
  <text x="668" y="170" font-family="'Inter', sans-serif" font-size="13" fill="#0F1419" opacity="0.7">People &#160;·&#160; Legal &#160;·&#160; Synthesis</text>

  <text x="668" y="190"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="12.5" font-style="italic" fill="#0F1419" opacity="0.28">Each a deep skill: frameworks, playbooks, worked examples.</text>

  <!-- Rule -->
  <line x1="668" y1="207" x2="1148" y2="207"
    stroke="#0F1419" stroke-width="1" opacity="0.1"/>

  <!-- Proof -->
  <text x="668" y="225"
    font-family="'JetBrains Mono', monospace"
    font-size="8.5" letter-spacing="2.2" fill="#3F6E6A">EVALUATED ON 20 OPERATOR QUESTIONS</text>

  <!-- STAT 1 -->
  <text x="668" y="278"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="52" font-weight="300" fill="#0F1419">+5.95</text>
  <text x="668" y="298"
    font-family="'Inter', sans-serif"
    font-size="11" fill="#0F1419" opacity="0.45">on a 20-point rubric vs. no-prompt baseline</text>
  <line x1="668" y1="313" x2="1148" y2="313"
    stroke="#0F1419" stroke-width="1" opacity="0.08"/>

  <!-- STAT 2 -->
  <text x="668" y="365"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="52" font-weight="300" fill="#0F1419">85<tspan font-size="23" dy="-15" dx="2">%</tspan></text>
  <text x="668" y="385"
    font-family="'Inter', sans-serif"
    font-size="11" fill="#0F1419" opacity="0.45">pairwise win rate — 17 of 20 questions</text>
  <line x1="668" y1="400" x2="1148" y2="400"
    stroke="#0F1419" stroke-width="1" opacity="0.08"/>

  <!-- STAT 3 — saffron highlight -->
  <text x="668" y="452"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="52" font-weight="300" fill="#D67E2C">100<tspan font-size="23" dy="-15" dx="2">%</tspan></text>
  <text x="668" y="472"
    font-family="'Inter', sans-serif"
    font-size="11" fill="#0F1419" opacity="0.45">when a specialist skill is loaded</text>
  <line x1="668" y1="487" x2="1148" y2="487"
    stroke="#0F1419" stroke-width="1" opacity="0.08"/>

  <!-- Methodology -->
  <text x="668" y="503"
    font-family="'JetBrains Mono', monospace"
    font-size="8.5" fill="#0F1419" opacity="0.2" letter-spacing="0.3">LLM-as-judge &#160;·&#160; Opus 4.7 judging Sonnet 4.6 &#160;·&#160; reproducible in evals/</text>

  <!-- GitHub link right column -->
  <text x="1148" y="524"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="16" font-weight="500" text-anchor="end"
    fill="#0F1419" opacity="0.6">github.com/rdmurugan/sabhaos</text>

  <!-- ══════════════════════════════════════════════════════
       FOOTER  y 542–628
  ══════════════════════════════════════════════════════════ -->

  <!-- Naming terms -->
  <text x="52" y="578"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="15">
    <tspan font-weight="600" fill="#B8924D">Sabha</tspan><tspan fill="#0F1419" opacity="0.32" font-size="13"> (council) &#160;·&#160; </tspan><tspan font-weight="600" fill="#B8924D">Chanakya</tspan><tspan fill="#0F1419" opacity="0.32" font-size="13"> (the voice) &#160;·&#160; </tspan><tspan font-weight="600" fill="#B8924D">Sakthi</tspan><tspan fill="#0F1419" opacity="0.32" font-size="13"> (the memory) &#160;·&#160; </tspan><tspan font-weight="600" fill="#B8924D">Sittham</tspan><tspan fill="#0F1419" opacity="0.32" font-size="13"> (corpus ingest)</tspan>
  </text>

  <text x="52" y="606"
    font-family="'Inter', sans-serif"
    font-size="10" fill="#0F1419" opacity="0.25" letter-spacing="0.3">MIT-licensed &#160;·&#160; forkable &#160;·&#160; local-first &#160;·&#160; your Sakthi belongs to you</text>

  <text x="1148" y="578"
    font-family="'JetBrains Mono', monospace"
    font-size="11" text-anchor="end"
    fill="#0F1419" opacity="0.42">github.com/rdmurugan/sabhaos</text>

  <text x="1148" y="600"
    font-family="'JetBrains Mono', monospace"
    font-size="9" text-anchor="end"
    fill="#0F1419" opacity="0.22">open-source &#160;·&#160; MIT &#160;·&#160; Claude plugin</text>

</svg>
